<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo to Speech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Photo to Speech</h1>
        <div class="upload-container">
            <input type="file" id="upload-input" accept="image/*">
            <label for="upload-input" class="upload-label">Upload Image</label>
            <img id="image-preview" src="#" alt="Image Preview" class="hidden"/>
            <button id="recognize-btn" class="hidden">Recognize Text</button>
        </div>
        <div class="result-container">
            <h2>Recognized Text:</h2>
            <p id="text-result"></p>
            <button id="speak-btn">Speak</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
